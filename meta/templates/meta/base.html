<!-- templates/analytics/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meta Analytics Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Poppins', sans-serif;
        }
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background-color: #0d6efd;
            color: white;
            padding: 20px;
        }
        .sidebar h3 {
            font-weight: 600;
            margin-bottom: 40px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .sidebar a:hover {
            text-decoration: underline;
        }
        .main-content {
            margin-left: 260px;
            padding: 30px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
        }
        footer {
            margin-top: 30px;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>📊 Meta Analytics</h3>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="#">Campaigns</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
        <footer>
            <p>© 2025 Meta Dashboard by Analytics App</p>
        </footer>
    </div>
</body>
</html>
