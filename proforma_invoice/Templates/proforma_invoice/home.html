{% extends 'proforma_invoice/base.html' %}
{% block content %}
   <style>
    .card {
      padding: 50px 30px;
      max-width: 400px;
      margin-top:5%;
      margin-bottom: 20px;
      width: 90%;
    }
  </style>


  <div class="main-container">
    <div class="card">
      <h1>Welcome to Proforma Maker</h1>
      <a href="{% url 'create_proforma' %}" class="btn">Create New Proforma</a>
      <a href="{% url 'proforma_list' %}" class="btn">View My Proformas</a>
      <a href="{% url 'proforma_product_list' %}" class="btn">View Products</a>
      {% if request.user.is_accountant %}
      <a href="{% url 'proforma_price_change_requests' %}" class="btn">Price Change Requests</a>
      {% endif %}
    </div>

  </div>

{% endblock content %}
