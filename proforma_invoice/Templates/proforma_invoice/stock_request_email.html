<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif;">

    <h2>📦 Stock Request Submitted</h2>

    <p>
        <strong>User:</strong> {{ requested_by }}
    </p>

    <p>
        <strong>Proforma ID:</strong> #{{ invoice.id }}
    </p>

    <h3>Shortage Details</h3>

    <table border="1" cellpadding="8" cellspacing="0" style="border-collapse: collapse;">
        <tr>
            <th>Product</th>
            <th>Details</th>
        </tr>

        {% for product, detail in shortage_details.items %}
        <tr>
            <td>{{ product }}</td>
            <td>{{ detail }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>

    <a href="{{ review_url }}"
       style="background:#0d6efd;color:white;padding:10px 18px;text-decoration:none;border-radius:6px;">
        Review Stock Requests
    </a>

</body>
</html>
