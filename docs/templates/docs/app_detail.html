<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #f8f9fb;
  color: #222;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h2 {
  margin-bottom: 10px;
}

h3 {
  margin-top: 20px;
}

a {
  color: #2563eb;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

.list {
  padding-left: 20px;
}

.table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 15px;
  background: white;
  border-radius: 8px;
  overflow: hidden;
}

.table th, .table td {
  padding: 10px;
  text-align: left;
}

.table th {
  background: #f1f5f9;
  font-weight: 600;
}

.table tr {
  border-bottom: 1px solid #e5e7eb;
}

.badge {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.badge-yes {
  background: #dcfce7;
  color: #166534;
}

.badge-no {
  background: #fee2e2;
  color: #991b1b;
}

.muted {
  color: #6b7280;
}
</style>
<div class="container">
  <h2>Models in {{ app }}</h2>

  <ul class="list">
    {% for model in models %}
      <li>
        <a href="/docs/model/{{model.app}}/{{model.name}}/">
          {{ model.name }}
        </a>
      </li>
    {% endfor %}
  </ul>
</div>
